select-findAllSocios = SELECT nombre, apellidos, dni, fecha_nacimiento, direccion, fecha_inscripcion, es_titular, titulo_patron FROM socios;
select-findSocioByDNI = SELECT nombre, apellidos, dni, fecha_nacimiento, direccion, fecha_inscripcion, es_titular, titulo_patron FROM socios WHERE dni=?;
insert-addSocio = INSERT INTO socios (nombre, apellidos, dni, fecha_nacimiento, direccion, fecha_inscripcion, es_titular, titulo_patron) VALUES (?, ?, ?, ?, ?, ?, ?, ?);


