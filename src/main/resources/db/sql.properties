############################################
select-findAllHijos = SELECT dni, nombre, apellidos, fecha_nacimiento, id_inscripcion FROM hijos;
select-findHijoByDNI = SELECT dni, id_inscripcion FROM hijos WHERE dni=?;
select-findHijosByInscripcion = SELECT dni, nombre, apellidos, fecha_nacimiento, id_inscripcion FROM hijos Where id_inscripcion=?;
insert-addHijo = INSERT INTO hijos (dni, nombre, apellidos, fecha_nacimiento, id_inscripcion) VALUES (?, ?, ?, ?, ?);

############################################
# ACOMPANANTES
############################################
select-findAllAcompanantes = SELECT id, dni, id_alquiler FROM acompanantes;
select-findAcompananteByDNI = SELECT id, dni, id_alquiler FROM acompanantes WHERE dni=?;
select-findAcompanantesByAlquiler = SELECT id, dni, id_alquiler FROM acompanantes WHERE id_alquiler=?;
insert-addAcompanante = INSERT INTO acompanantes (dni, id_alquiler) VALUES (?, ?);
delete-deleteAcompanantesByAlquiler = DELETE FROM acompanantes WHERE id_alquiler = ?;
delete-deleteAcompanante = DELETE FROM acompanantes WHERE id_alquiler = ? AND dni = ?;
