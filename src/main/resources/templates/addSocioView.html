<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Club Náutico - Añadir Socio</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    </head>
    <body>
        <div class="container mt-5">

            <div th:if="${mensajeExito}" class="alert alert-success" th:text>${mensajeExito}</div>
            <div th:if="${mensajeError}" class="alert alert-danger" th:text>${mensajeError}</div>

            <h1 class="text-center mb-4">Registrar Nuevo Socio</h1>

            <form th:action="@{/api/socios/addSocio}" th:object="${socio}" method="post" class="card p-4 shadow-sm">

                <div class="row mb-3">
                    <div class="col">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required />
                    </div>
                    <div class="col">
                        <label for="apellidos" class="form-label">Apellidos</label>
                        <input type="text" id="apellidos" th:field="*{apellidos}" class="form-control" required />
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="dni" class="form-label">DNI</label>
                        <input type="text" id="dni" th:field="*{dni}" class="form-control" required />
                    </div>
                    <div class="col">
                        <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                        <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" class="form-control" required />
                    </div>
                </div>

                <div class="row mb-3 items-baseline">
                    <div class="col">
                        <label for="direccion" class="form-label">Direccion</label>
                        <input type="text" id="direccion" th:field="*{direccion}" class="form-control" required />
                    </div>
                </div>

                <div class="mb-3">
                    <input type="checkbox" id="esTitular" th:field="*{esTitular}" value="Boolean" class="checkbox" />
                    <label for="esTitular" class="form-label">Eres el titular de la inscripción</label>
                </div>

                <div class="mb-3">
                    <input type="checkbox" id="tieneLicenciaPatron" th:field="*{tieneLicenciaPatron}" value="Boolean" class="checkbox" />
                    <label for="tieneLicenciaPatron" class="form-label">Licencia de patrón</label>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary mt-3">Guardar Socio</button>
                </div>

            </form>

        </div>
    </body>
</html>
