<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Club Náutico - Añadir Socio</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="bg-light">

            <div th:if="${mensajeExito}" class="alert alert-success" th:text>${mensajeExito}</div>
            <div th:if="${mensajeError}" class="alert alert-danger" th:text>${mensajeError}</div>

            <h1 class="text-center mb-4">Registrar Nuevo Socio</h1>

            <form th:action="@{/api/socios/addSocio}" th:object="&{alquiler}" method="post" class="card p-4 shadow-sm">



            </form>

        </div>
    </body>
</html>
