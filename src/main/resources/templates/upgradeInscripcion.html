<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    <title>Club Náutico - Ampliar la Inscripción</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
x
<div class="container mt-5">
    <div th:if="${mensajeExito}" class="alert alert-success" th:text>${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text>${mensajeError}"></div>

    <h1 class="text-center mb-4">Ampliar suscripción</h1>

    <form th:action="@{/api/inscripciones/upgradeInscripcion}" th:object="${inscripcion}" method="post" class="card p-4 shadow-sm" >

        <input type="hidden" th:field="*{id}" id="inscripcionId" />

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="socioTitularId" class="form-label">DNI del socio titular</label>
                <input type="text" id="socioTitularId" th:field="*{socioTitularId}" class="form-control" readonly />
            </div>
            <div class="col-md-6">
                <label for="segundoAdulto" class="form-label">DNI del segundo adulto de la familia</label>
                <input type="text" id="segundoAdulto" th:field="*{segundoAudlto}" class="form-control" />
            </div>
        </div>

        <hr class="my-4">
        <h5 class="mb-3">Hijos</h5>

        <div id="hijos-container">
            <div th:each="hijo, iterStat : *{hijos}" class="input-group mb-2">
                <input type="text" th:field="*{hijos[__${iterStat.index}__].dni}" class="form-control" placeholder="DNI del hijo" />

                <input type="hidden" th:field="*{hijos[__${iterStat.index}__].id_inscripcion}" />

                <button type="button" class="btn btn-outline-danger" onclick="removeHijo(this)">Eliminar</button>
            </div>
        </div>

        <button type="button" id="add-hijo-btn" class="btn btn-outline-success mt-2" style="max-width: 150px;">
            Añadir Hijo
        </button>

        <hr class="my-4">
        <div class="text-end">
            <a th:href="@{/}" class="btn btn-secondary me-2">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        </div>

    </form>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/

    const container = document.getElementById('hijos-container');
    const addButton = document.getElementById('add-hijo-btn');

    // 2. Función para AÑADIR un nuevo campo
    addButton.addEventListener('click', function() {
        // Contamos los hijos actuales para el nuevo índice
        const newIndex = container.getElementsByClassName('input-group').length;

        // NUEVO: Leemos el ID de la inscripción principal desde el campo oculto
        const inscripcionId = document.getElementById('inscripcionId').value;

        // Creamos el nuevo HTML para el campo
        const newHijoDiv = document.createElement('div');
        newHijoDiv.className = 'input-group mb-2';

        // MODIFICADO: Añadimos el nuevo campo oculto 'id_inscripcion'
        newHijoDiv.innerHTML = `
                <input type="text" name="hijos[${newIndex}].dni" class="form-control" placeholder="DNI del nuevo hijo" />
                <input type="hidden" name="hijos[${newIndex}].id_inscripcion" value="${inscripcionId}" />
                <button type="button" class="btn btn-outline-danger" onclick="removeHijo(this)">Eliminar</button>
            `;

        container.appendChild(newHijoDiv);

        // Re-indexamos por si acaso (aunque al añadir al final no sería 100% necesario,
        // es buena práctica si 'removeHijo' no lo hiciera, pero 'removeHijo' sí lo hace)
        reindexarCampos();
    });

    // 3. Función para ELIMINAR un campo
    function removeHijo(button) {
        button.parentElement.remove();

        // Después de eliminar, re-indexamos todo.
        reindexarCampos();
    }

    // 4. Función para RE-INDEXAR (¡Importante!)
    // MODIFICADO: Ahora re-indexa ambos campos (dni y id_inscripcion)
    function reindexarCampos() {
        const campos = container.getElementsByClassName('input-group');

        for (let i = 0; i < campos.length; i++) {
            // Buscamos los inputs dentro de este 'div'
            const dniInput = campos[i].querySelector('input[name*=".dni"]');
            const idInscripcionInput = campos[i].querySelector('input[name*=".id_inscripcion"]');

            // Actualizamos el atributo 'name' al índice correcto
            if (dniInput) {
                dniInput.name = `hijos[${i}].dni`;
            }
            if (idInscripcionInput) {
                idInscripcionInput.name = `hijos[${i}].id_inscripcion`;
            }
        }
    }

    /*]]>*/
</script>

</body>
</html>
