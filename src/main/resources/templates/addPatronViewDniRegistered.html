<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Error al añadir Patrón</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            border: 1px solid #d9534f;
            background-color: #f2dede;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #a94442;
            margin-top: 0;
        }
        p {
            font-size: 1.2em;
            color: #333;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="error-container">
    <h1>Error: DNI registrado</h1>
    <p>El DNI que has introducido ya existe en el sistema de socios.</p>
    <p>Por favor, registra uno nuevo como socio antes de añadirlo como patrón.</p>

    <a th:href="@{/addPatron}">Volver a intentarlo</a>
</div>

</body>
</html>
