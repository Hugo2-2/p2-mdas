<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Reserva de Actividad - Club Náutico</title>
    <link th:href="@{/styles.css}" rel="stylesheet">

</head>

<body>
<!-- Header -->
<header class="header">
    <div class="header-content">
        <div class="logo">📋 Nueva Reserva de Actividad</div>
        <div class="header-buttons">
            <a th:href="@{/api/reserva}" class="btn">← Volver a Reservas</a>
            <a th:href="@{/menu}" class="btn">Menú Principal</a>
        </div>
    </div>
</header>

<div class="container mt-5">
    <!-- Mensajes -->
    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <h1 class="titulo-principal">Registrar nueva reserva de actividad</h1>

    <!-- Formulario -->
    <form th:action="@{/api/reserva/addReserva}" th:object="${reserva}" method="post" class="card">
        <div class="card-header">
            <span>Información de la Reserva</span>
        </div>

        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="date" class="form-label">Fecha de la actividad</label>
                        <input type="date" id="date" th:field="*{date}" class="form-control" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="seats" class="form-label">Plazas solicitadas</label>
                        <input type="number" id="seats" th:field="*{seats}" class="form-control" min="1"
                               required oninput="actualizarPrecio()">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="userId" class="form-label">DNI del socio solicitante</label>
                        <input type="text" id="userId" th:field="*{userId}" class="form-control"
                               placeholder="Ej: 12345678A"  minlength="9" maxlength="9" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="boatRegistration" class="form-label">Matrícula de la embarcación</label>
                        <input type="text" id="boatRegistration" th:field="*{boatRegistration}"
                               class="form-control" placeholder="Ej: ABC-1234" required>
                    </div>
                </div>
            </div>

            <div class="form-group mb-3">
                <label for="description" class="form-label">Descripción / propósito de la actividad</label>
                <textarea id="description" th:field="*{description}" rows="3"
                          class="form-control"
                          placeholder="Ej: excursión a la isla, comida en alta mar..." required></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn">Guardar Reserva</button>
            </div>
        </div>
    </form>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="mb-0">Sistema de Gestión Club Náutico &copy; 2025</p>
    </div>
</footer>
</body>
</html>
