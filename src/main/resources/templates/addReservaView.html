<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Reserva de Actividad</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
<div class="container mt-5">

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}">Error en la reserva.</div>

    <h1 class="mb-4 text-center">⚓ Solicitar Reserva de Actividad</h1>
    <p class="text-center text-muted">Embarcación con patrón para actividad de un día (40€ por persona).</p>

    <form method="POST" th:action="@{/web/reserva/solicitar}" th:object="${reserva}" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="usuario_id" class="form-label">DNI del Socio Solicitante (Debe ser mayor de edad)</label>
            <input type="text" id="usuario_id" th:field="*{usuario_id}" class="form-control"
                   placeholder="Ej: 12345678A" pattern="[0-9]{8}[A-Z]" required>

        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Propósito / Descripción de la Actividad</label>
            <input type="text" id="descripcion" th:field="*{descripcion}" class="form-control" required>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="fecha" class="form-label">Fecha de la Actividad (Día único)</label>
                <input type="date" id="fecha" th:field="*{fecha}" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="plazas" class="form-label">Plazas Solicitadas</label>
                <input type="number" id="plazas" th:field="*{plazas}" class="form-control" min="1" required>
                <small class="form-text text-muted">Capacidad máxima: Plazas de la embarcación - 1 (Patrón)</small>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary mt-3">Confirmar Reserva (40€ / persona)</button>
        </div>

    </form>
    <div class="text-center mt-3">
        <a th:href="@{/home}" class="btn btn-link">Volver al Menú Principal</a>
    </div>
</div>
</body>
</html>
