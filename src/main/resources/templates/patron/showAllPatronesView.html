<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Patrones - Club Náutico</title>
    <link th:href="@{/styles.css}" rel="stylesheet">
</head>
<body>
<header class="header">
    <div class="header-content">
        <div class="logo">🧑‍✈️ Listado de Patrones</div>
        <div class="header-buttons">
            <a th:href="@{/menu}" class="btn">Menú Principal</a>
        </div>
    </div>
</header>

<div class="container">
    <h1 class="titulo-principal">Listado de Todos los Patrones</h1>

    <div class="card">
        <div class="card-header">
            <span>Patrones (empleados) registrados en el sistema</span>
        </div>
        <div class="card-body">

            <div th:if="${listaPatrones == null or listaPatrones.isEmpty()}" class="text-center py-4">
                <p class="text-muted">No hay ningún patrón registrado en el sistema.</p>
            </div>

            <div th:if="${listaPatrones != null and !listaPatrones.isEmpty()}">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellidos</th>
                            <th>DNI</th>
                            <th>Fecha Nacimiento</th>
                            <th>Fecha Expedición Título</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="patron : ${listaPatrones}">
                            <td>
                                <strong th:text="${patron.nombre}"></strong>
                            </td>
                            <td th:text="${patron.apellidos}"></td>
                            <td>
                                <span class="badge badge-primary" th:text="${patron.dni}"></span>
                            </td>
                            <!-- Usamos #temporals para formatear las fechas LocalDate -->
                            <td th:text="${#temporals.format(patron.fechaNacimiento, 'dd-MM-yyyy')}"></td>
                            <td th:text="${#temporals.format(patron.fechaExpedicionTitulo, 'dd-MM-yyyy')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="mb-0">Sistema de Gestión Club Náutico &copy; 2025</p>
    </div>
</footer>
</body>
</html>
