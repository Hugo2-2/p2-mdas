<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Alquiler</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script>
        // Script para añadir dinámicamente acompañantes
        function agregarAcompanante() {
            const container = document.getElementById('acompanantes-container');

            const div = document.createElement('div');
            div.classList.add('input-group', 'mb-2');
            div.innerHTML = `
                <input type="text" name="acompanantesDni" class="form-control" placeholder="DNI del acompañante" required>
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">Eliminar</button>
            `;
            container.appendChild(div);
        }
    </script>
</head>

<body class="bg-light">
<div class="container mt-5">

    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <h1 class="mb-4 text-center">Registrar nuevo alquiler</h1>

    <form th:action="@{/api/alquiler/addAlquiler}" th:object="${alquiler}" method="post" class="card p-4 shadow-sm">

        <div class="row mb-3">
            <div class="col">
                <label for="fechainicio" class="form-label">Fecha de inicio</label>
                <input type="date" id="fechainicio" th:field="*{fechainicio}" class="form-control" required>
            </div>
            <div class="col">
                <label for="fechafin" class="form-label">Fecha de fin</label>
                <input type="date" id="fechafin" th:field="*{fechafin}" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="plazas" class="form-label">Plazas</label>
            <input type="number" id="plazas" th:field="*{plazas}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="usuario_dni" class="form-label">DNI del socio</label>
            <input type="text" id="usuario_dni" th:field="*{usuario_dni}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="matricula_embarcacion" class="form-label">Matrícula de la embarcación</label>
            <input type="text" id="matricula_embarcacion" th:field="*{matricula_embarcacion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Acompañantes</label>
            <div id="acompanantes-container"></div>
            <button type="button" class="btn btn-secondary mt-2" onclick="agregarAcompanante()">+ Añadir acompañante</button>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary mt-3">Guardar Alquiler</button>
        </div>

    </form>
</div>
</body>
</html>
