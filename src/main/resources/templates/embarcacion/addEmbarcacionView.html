<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Añadir Embarcación - Club Náutico</title>
    <link th:href="@{/styles.css}" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">⛵ Añadir Embarcación</div>
            <div class="header-buttons">
                <a th:href="@{/api/embarcaciones/showAllEmbarcaciones}" class="btn">← Volver a Embarcaciones</a>
                <a th:href="@{/menu}" class="btn">Menú Principal</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div th:if="${successMessage}" class="alert alert-success" style="color: green;">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" style="color: red;">
            <p th:text="${errorMessage}"></p>
        </div>

        <h1 class="titulo-principal">Añadir una nueva embarcación</h1>

        <form method="POST" th:action="@{/api/embarcaciones/addEmbarcacion}" th:object="${newEmbarcacion}" class="card">
            <div class="card-header">
                <span>Información de la Embarcación</span>
            </div>
            
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="registration" class="form-label">Matrícula:</label>
                            <input type="text" id="registration" th:field="*{registration}" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="name" class="form-label">Nombre:</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="type" class="form-label">Tipo:</label>
                            <select id="type" th:field="*{type}" class="form-control" required>
                                <option value="">-- Selecciona un tipo --</option>
                                <option value="VELERO">Velero</option>
                                <option value="YATE">Yate</option>
                                <option value="LANCHA">Lancha</option>
                                <option value="BARCA_PESCA">Barca de Pesca</option>
                                <option value="CATAMARAN">Catamarán</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="seats" class="form-label">Plazas:</label>
                            <input type="number" id="seats" th:field="*{seats}" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="dimensions" class="form-label">Dimensiones(m2):</label>
                            <input type="text" id="dimensions" th:field="*{dimensions}" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="skipperId" class="form-label">DNI del Patrón:</label>
                            <input type="text" id="skipperId" th:field="*{skipperId}" class="form-control" minlength="9" maxlength="9">
                            <div class="form-text">Opcional - dejar vacío si no tiene patrón asignado</div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn">Guardar Embarcación</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">Sistema de Gestión Club Náutico &copy; 2025</p>
        </div>
    </footer>
</body>
</html>
