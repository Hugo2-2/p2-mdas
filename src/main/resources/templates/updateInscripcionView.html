<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mejorar Inscripción - Club Náutico</title>
    <link th:href="@{/styles.css}" rel="stylesheet">

    <style>
        .opcion-hijos {
            display: none;
        }
        .boton-continuar-hijos {
            display: none;
        }
        #anadirHijos:checked ~ .opcion-hijos {
            display: block;
        }
        #anadirHijos:checked ~ .boton-continuar-hijos {
            display: inline-block;
        }
    </style>
</head>

<body>
<!-- Header -->
<header class="header">
    <div class="header-content">
        <div class="logo">👨‍👩‍👧‍👦 Mejorar Inscripción</div>
        <div class="header-buttons">
            <a th:href="@{/menu}" class="btn">Menú Principal</a>
        </div>
    </div>
</header>

<div class="container">
    <h1 class="titulo-principal">Completar Inscripción Familiar</h1>

    <!-- Mensajes -->
    <div th:if="${mensajeExito}" class="alert alert-success">
        <p th:text="${mensajeExito}"></p>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger">
        <p th:text="${mensajeError}"></p>
    </div>

    <!-- Formulario -->
    <form method="POST" th:action="@{/api/inscripciones/updateInscripcion}" class="card">
        <div class="card-header">
            <span>Información Familiar</span>
        </div>

        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="dniTitular" class="form-label">DNI Titular:</label>
                        <input type="text" id="dniTitular" name="dniTitular" class="form-control" minlength="9" maxlength="9" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label for="dniSegundoAdulto" class="form-label">DNI segundo acompañante:</label>
                        <input type="text" id="dniSegundoAdulto" name="dniSegundoAdulto" class="form-control" minlength="9" maxlength="9">
                        <div class="form-text">Opcional - máximo 9 caracteres</div>
                    </div>
                </div>
            </div>



            <div class="form-group">
                <label for="anadirHijos" class="form-label mb-0">¿Desea Añadir Hijos?</label>
                <input type="checkbox" id="anadirHijos" name="anadirHijos" value="true" class="me-2" />

                <div class="opcion-hijos mt-2">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="numeroHijos" class="form-label">Número de hijos:</label>
                                <input type="number" id="numeroHijos" name="numeroHijos" class="form-control" min="0">
                            </div>
                        </div>
                    </div>
                </div>

                    <button type="submit" name="siguientePaso" value="finalizar" class="btn d-flex justify-content-end gap-2 mt-4">
                        Finalizar Inscripción
                    </button>
                    <button type="submit" name="siguientePaso" value="continuarHijos" class="btn boton-continuar-hijos d-flex justify-content-end gap-2 mt-4">
                        Continuar con el número de hijos
                    </button>
            </div>


        </div>
    </form>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="mb-0">Sistema de Gestión Club Náutico &copy; 2024</p>
    </div>
</footer>
</body>
</html>
