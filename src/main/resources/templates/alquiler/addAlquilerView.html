<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Alquiler - Club Náutico</title>
    <link th:href="@{/styles.css}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">📝 Nuevo Alquiler</div>
                <div class="header-buttons">
                    <a th:href="@{/api/alquiler}" class="btn">← Volver a Alquileres</a>
                    <a th:href="@{/menu}" class="btn">Menú Principal</a>
                </div>
        </div>
    </header>

    <div class="container mt-5">
        <!-- Mensajes de éxito o error -->
        <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
        <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

        <h1 class="titulo-principal">Registrar nuevo alquiler</h1>

        <!-- Formulario principal de alquiler -->
        <form th:action="@{/api/alquiler/addAlquiler}" 
              th:object="${alquiler}" 
              method="post" 
              class="card">

            <div class="card-header">
                <span>Información del Alquiler</span>
            </div>

            <div class="card-body">
                <div class="row mb-3">
                    <div class="col">
                        <div class="form-group">
                            <label for="startDate" class="form-label">Fecha de inicio</label>
                            <input type="date" id="startDate" th:field="*{startDate}" class="form-control" required>
                        </div>
                    </div>
                    <div class="col">
                        <div class="form-group">
                            <label for="endDate" class="form-label">Fecha de fin</label>
                            <input type="date" id="endDate" th:field="*{endDate}" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label for="seats" class="form-label">Plazas</label>
                    <input type="number" id="seats" th:field="*{seats}" class="form-control" required min="1">
                </div>

                <div class="form-group mb-3">
                    <label for="boatRegistration" class="form-label">Matrícula de la embarcación</label>
                    <input type="text" id="boatRegistration" th:field="*{boatRegistration}" class="form-control" required>
                </div>

                <div class="form-group mb-3">
                    <label for="userNationalId" class="form-label">DNI del socio</label>
                    <input type="text" id="userNationalId" th:field="*{userNationalId}" class="form-control" minlength="9" maxlength="9" required>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn">Guardar Alquiler</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">Sistema de Gestión Club Náutico &copy; 2025</p>
        </div>
    </footer>
</body>
</html>
